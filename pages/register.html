<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <a href="login.html" class="nav-link">이미 계정이 있으신가요? 로그인 →</a>
    </nav>

    <div class="auth-main">
      <div class="auth-card">
        <div class="auth-top">
          <div class="auth-icon">✏️</div>
          <div class="auth-title">회원가입</div>
          <div class="auth-sub">JEONG Bank에 오신 것을 환영합니다</div>
        </div>

        <div class="step-bar">
          <div class="step-bar-item active">기본 정보</div>
          <div class="step-bar-item active">인증 정보</div>
          <div class="step-bar-item">추가 정보</div>
        </div>

        <form>
          <div class="divider-section">
            <div class="divider-line"></div>
            <span class="divider-label">기본 정보</span>
            <div class="divider-line"></div>
          </div>

          <div class="form-group">
            <label class="form-label">이름 <span>*</span></label>
            <input
              type="text"
              class="form-input"
              placeholder="실명을 입력하세요"
            />
          </div>

          <div class="form-group">
            <label class="form-label">주민등록번호 <span>*</span></label>
            <div class="ssn-row">
              <input
                type="text"
                class="ssn-front"
                placeholder="앞 6자리"
                maxlength="6"
                inputmode="numeric"
              />
              <span class="ssn-dash">-</span>
              <input
                type="password"
                class="ssn-back"
                placeholder="뒷 1자리"
                maxlength="1"
                inputmode="numeric"
              />
            </div>
            <div class="form-hint">* 뒷자리는 첫 번째 숫자만 입력합니다</div>
          </div>

          <div class="divider-section">
            <div class="divider-line"></div>
            <span class="divider-label">인증 정보</span>
            <div class="divider-line"></div>
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호 <span>*</span></label>
            <input
              type="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
            />
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호 확인 <span>*</span></label>
            <input
              type="password"
              class="form-input"
              placeholder="비밀번호를 다시 입력하세요"
            />
          </div>

          <div class="divider-section">
            <div class="divider-line"></div>
            <span class="divider-label">추가 정보</span>
            <div class="divider-line"></div>
          </div>

          <div class="form-group">
            <label class="form-label">직업 <span>*</span></label>
            <select class="form-select">
              <option value="" disabled selected>직업을 선택하세요</option>
              <option value="employed">직장인</option>
              <option value="selfemployed">자영업자</option>
              <option value="student">학생</option>
              <option value="freelancer">프리랜서</option>
              <option value="unemployed">무직</option>
              <option value="other">기타</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">주소 <span>*</span></label>
            <input
              type="text"
              class="form-input"
              placeholder="주소를 입력하세요"
            />
          </div>

          <div class="form-group">
            <label class="form-label">연봉 <span>*</span></label>
            <input
              type="number"
              class="form-input"
              placeholder="연봉을 입력하세요 (원)"
              min="0"
            />
            <div class="form-hint">* 연봉 정보는 등급 산정에 활용됩니다</div>
          </div>

          <button type="submit" class="btn-submit">회원가입 완료</button>
        </form>

        <div class="auth-footer" style="margin-top: 1.5rem">
          이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>
  </body>
</html>
