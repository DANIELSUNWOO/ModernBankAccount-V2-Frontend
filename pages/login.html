<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <a href="register.html" class="nav-link">회원가입하기 →</a>
    </nav>

    <div class="auth-main">
      <div class="auth-card">
        <div class="auth-top">
          <div class="auth-icon">🔐</div>
          <div class="auth-title">로그인</div>
          <div class="auth-sub">주민등록번호와 비밀번호로 로그인하세요</div>
        </div>

        <div class="notice">
          🛡 <strong>안전 알림</strong> — JEONG Bank는 절대 전화나 문자로
          비밀번호를 요구하지 않습니다.
        </div>

        <form>
          <div class="form-group">
            <label class="form-label">주민등록번호</label>
            <div class="ssn-row">
              <input
                type="text"
                class="ssn-front"
                placeholder="앞 6자리"
                maxlength="6"
                inputmode="numeric"
              />
              <span class="ssn-dash">-</span>
              <input
                type="password"
                class="ssn-back"
                placeholder="뒷 1자리"
                maxlength="1"
                inputmode="numeric"
              />
            </div>
            <div class="form-hint">* 뒷자리는 첫 번째 숫자만 입력합니다</div>
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input
              type="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
            />
          </div>

          <button type="submit" class="btn-submit">로그인</button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">또는</span>
          <div class="divider-line"></div>
        </div>

        <div class="auth-footer">
          계정이 없으신가요? <a href="register.html">회원가입하기</a>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>
  </body>
</html>
