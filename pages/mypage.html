<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 내 정보 수정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/pages/mypage.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <a href="dashboard.html" class="nav-back">← 대시보드</a>
    </nav>

    <div class="main-sm">
      <div class="page-title">⚙️ 내 정보 수정</div>

      <div class="profile-card">
        <div class="profile-avatar">👤</div>
        <div>
          <div class="profile-name">홍길동</div>
          <div class="profile-grade">🌸 일반 회원</div>
          <div class="profile-joined">가입일: 2025년 5월 13일</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">
          🔒 기본 정보
          <span
            style="font-size: 11px; color: var(--text-muted); font-weight: 400"
            >(수정 불가)</span
          >
        </div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <div class="form-readonly">
            홍길동 <span class="form-readonly-badge">변경 불가</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">주민등록번호</label>
          <div class="form-readonly">
            ●●●●●● - ●●●●●●● <span class="form-readonly-badge">보안</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">✏️ 수정 가능 정보</div>
        <div class="form-group">
          <label class="form-label">직업</label>
          <select class="form-select">
            <option value="employed" selected>직장인</option>
            <option value="selfemployed">자영업자</option>
            <option value="student">학생</option>
            <option value="freelancer">프리랜서</option>
            <option value="unemployed">무직</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">주소</label>
          <input
            type="text"
            class="form-input"
            value="서울특별시 강남구 테헤란로 123"
          />
        </div>
        <div class="form-group">
          <label class="form-label">연봉</label>
          <input type="number" class="form-input" value="50000000" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">🔑 비밀번호 변경</div>
        <div class="form-group">
          <label class="form-label">현재 비밀번호</label>
          <input
            type="password"
            class="form-input"
            placeholder="현재 비밀번호를 입력하세요"
          />
        </div>
        <div class="form-group">
          <label class="form-label">새 비밀번호</label>
          <input
            type="password"
            class="form-input"
            placeholder="새 비밀번호를 입력하세요"
          />
        </div>
        <div class="form-group">
          <label class="form-label">새 비밀번호 확인</label>
          <input
            type="password"
            class="form-input"
            placeholder="새 비밀번호를 다시 입력하세요"
          />
        </div>
      </div>

      <div class="section">
        <div class="section-label">⭐ 등급 정보</div>
        <div class="form-group">
          <label class="form-label">현재 등급</label>
          <div class="form-readonly">
            🌸 일반 회원 <span class="form-readonly-badge">자동 산정</span>
          </div>
        </div>
        <div class="vip-progress">
          <div class="vip-title">✦ VIP 승급 조건</div>
          <div class="vip-condition">
            <div class="vip-check pending">✗</div>
            <span
              >가입 후 1년 이상 경과
              <span style="color: var(--text-muted)">(현재 0개월)</span></span
            >
          </div>
          <div class="vip-condition">
            <div class="vip-check done">✓</div>
            <span
              >계좌 잔액 1억 원 이상
              <span style="color: var(--text-muted)"
                >(현재 ₩ 2,000,010,000)</span
              ></span
            >
          </div>
        </div>
      </div>

      <button class="btn-save" onclick="saveInfo()">변경사항 저장</button>
      <button class="btn-danger" onclick="confirmWithdraw()">회원 탈퇴</button>
    </div>

    <div class="toast" id="toast"></div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>

    <script src="../js/common.js"></script>
    <script src="../js/pages/mypage.js"></script>
  </body>
</html>
