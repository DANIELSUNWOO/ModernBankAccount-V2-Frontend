<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 승인 대기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/pages/pending.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <a href="dashboard.html" class="nav-back">← 대시보드</a>
    </nav>

    <div class="main-sm">
      <div class="page-title">🔔 승인 대기</div>
      <div class="page-sub">
        수신된 이체 요청을 확인하고 승인 또는 거절하세요
      </div>

      <div class="notice-dark">
        <div class="notice-icon">🛡</div>
        <div class="notice-text">
          <strong>피싱 방지 안내</strong><br />
          모르는 사람이 보낸 이체 요청은 반드시 <strong>거절</strong>하세요.
          핑돈 사기는 이체를 승인하는 순간 피해가 발생합니다.
        </div>
      </div>

      <div class="account-selector">
        <span class="account-selector-label">계좌 선택</span>
        <select>
          <option>JEONG-1778607374409-3586 (입출금)</option>
        </select>
      </div>

      <div class="pending-list" id="pendingList">
        <div class="pending-card" id="card-1">
          <div class="pending-card-top">
            <div class="pending-header">
              <div class="pending-sender">
                <div class="sender-avatar">👤</div>
                <div class="sender-info">
                  <div class="sender-name">김민준</div>
                  <div class="sender-account">JEONG-****-1234</div>
                </div>
              </div>
              <div class="pending-badge">⚠️ 의심 거래</div>
            </div>
            <div>
              <div class="pending-amount-label">이체 요청 금액</div>
              <div class="pending-amount">₩ 300,000</div>
              <div class="pending-time">2026.05.12 18:45 요청</div>
            </div>
          </div>
          <div class="pending-warning">
            ⚠️ 처음 거래하는 계좌입니다. 모르는 사람이라면 반드시 거절하세요.
          </div>
          <div class="pending-card-bottom">
            <button
              class="btn-reject"
              onclick="handleReject('card-1', '김민준')"
            >
              ❌ 거절하기
            </button>
            <button
              class="btn-approve"
              onclick="handleApprove('card-1', '김민준', 300000)"
            >
              ✅ 승인하기
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>

    <script src="../js/common.js"></script>
    <script src="../js/pages/pending.js"></script>
  </body>
</html>
