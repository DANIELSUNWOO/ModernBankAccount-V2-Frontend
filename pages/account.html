<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 계좌 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/pages/account.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <div class="nav-right">
        <a href="dashboard.html" class="nav-back">← 대시보드</a>
      </div>
    </nav>

    <div class="main">
      <div class="page-header">
        <div class="page-title">🏦 계좌 관리</div>
        <button class="btn-create" onclick="openCreateModal()">
          + 계좌 생성
        </button>
      </div>

      <div class="account-list">
        <div class="account-card">
          <div class="account-card-top">
            <div class="account-info">
              <div class="account-type">입출금(보통)</div>
              <div class="account-number">JEONG-1778607374409-3586</div>
              <span class="account-status active">ACTIVE</span>
            </div>
            <div class="account-balance-wrap">
              <div class="account-balance-label">잔액</div>
              <div class="account-balance">₩ 2,000,010,000</div>
            </div>
          </div>
          <div class="account-card-bottom">
            <a href="deposit.html" class="btn-action btn-deposit">📥 입금</a>
            <a href="withdraw.html" class="btn-action btn-withdraw">📤 출금</a>
            <a href="transfer.html" class="btn-action btn-transfer">💸 이체</a>
            <button
              class="btn-action btn-delete"
              onclick="confirmDelete('JEONG-1778607374409-3586')"
            >
              🗑 해지
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 계좌 생성 모달 -->
    <div class="modal-overlay" id="createModal">
      <div class="modal">
        <div class="modal-title">계좌 생성</div>
        <div class="modal-sub">개설할 계좌 종류를 선택하세요</div>
        <div class="type-grid">
          <div class="type-item" onclick="selectType(this, 1)">
            <div class="type-item-icon">💳</div>
            <div class="type-item-name">입출금(보통)</div>
            <div class="type-item-desc">자유롭게 입출금</div>
          </div>
          <div class="type-item" onclick="selectType(this, 2)">
            <div class="type-item-icon">📅</div>
            <div class="type-item-name">적금(정기)</div>
            <div class="type-item-desc">정해진 날짜에 저축</div>
          </div>
          <div class="type-item" onclick="selectType(this, 3)">
            <div class="type-item-icon">🗓</div>
            <div class="type-item-name">적금(자유)</div>
            <div class="type-item-desc">원하는 날짜에 저축</div>
          </div>
          <div class="type-item" onclick="selectType(this, 4)">
            <div class="type-item-icon">🏛</div>
            <div class="type-item-name">예금</div>
            <div class="type-item-desc">만기까지 이자 수령</div>
          </div>
          <div class="type-item" onclick="selectType(this, 5)">
            <div class="type-item-icon">🏠</div>
            <div class="type-item-name">주택청약</div>
            <div class="type-item-desc">청약 자격 획득</div>
          </div>
          <div class="type-item" onclick="selectType(this, 6)">
            <div class="type-item-icon">🅿️</div>
            <div class="type-item-name">파킹통장</div>
            <div class="type-item-desc">높은 이자 + 입출금</div>
          </div>
          <div
            class="type-item"
            onclick="selectType(this, 7)"
            style="grid-column: 1 / -1"
          >
            <div class="type-item-icon">📈</div>
            <div class="type-item-name">CMA</div>
            <div class="type-item-desc">매일 이자 + 자유 입출금</div>
          </div>
        </div>
        <div class="modal-btns">
          <button class="btn-modal-cancel" onclick="closeModal('createModal')">
            취소
          </button>
          <button class="btn-modal-confirm" onclick="createAccount()">
            생성하기
          </button>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>

    <script src="../js/common.js"></script>
    <script src="../js/pages/account.js"></script>
  </body>
</html>
