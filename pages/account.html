<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEONG Bank - 계좌 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --pink: #f4a7be;
        --pink-dark: #e07898;
        --pink-light: #fde8ef;
        --pink-border: #f8c8d8;
        --dark: #1a1a1a;
        --text-muted: #888888;
        --text-pink: #c05878;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--pink-light);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 48px;
        background: #ffffff;
        border-bottom: 1px solid var(--pink-border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--dark);
        text-decoration: none;
        letter-spacing: -0.5px;
      }

      .logo span {
        color: var(--pink-dark);
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .nav-back {
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
      }

      .nav-back:hover {
        color: var(--pink-dark);
      }

      .main {
        flex: 1;
        max-width: 960px;
        margin: 0 auto;
        padding: 2.5rem 2rem;
        width: 100%;
        animation: fadeUp 0.5s ease both;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        color: var(--dark);
        letter-spacing: -0.5px;
      }

      .btn-create {
        padding: 10px 22px;
        font-size: 14px;
        font-family: inherit;
        font-weight: 700;
        background: var(--pink);
        color: #fff;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
      }

      .btn-create:hover {
        background: var(--pink-dark);
        transform: translateY(-1px);
      }

      /* 계좌 카드 */
      .account-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 2rem;
      }

      .account-card {
        background: #fff;
        border-radius: 20px;
        border: 1px solid var(--pink-border);
        padding: 1.5rem 1.8rem;
        transition: transform 0.2s;
      }

      .account-card:hover {
        transform: translateY(-2px);
      }

      .account-card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.2rem;
      }

      .account-info {
      }

      .account-type {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .account-number {
        font-size: 15px;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 6px;
        letter-spacing: -0.3px;
      }

      .account-status {
        display: inline-block;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 50px;
        font-weight: 700;
      }

      .account-status.active {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .account-status.frozen {
        background: #e3f2fd;
        color: #1565c0;
      }
      .account-status.closed {
        background: #f5f5f5;
        color: #757575;
      }

      .account-balance-wrap {
        text-align: right;
      }

      .account-balance-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .account-balance {
        font-size: 24px;
        font-weight: 700;
        color: var(--dark);
        letter-spacing: -0.5px;
      }

      .account-card-bottom {
        display: flex;
        gap: 8px;
        border-top: 1px solid var(--pink-border);
        padding-top: 1rem;
      }

      .btn-action {
        flex: 1;
        padding: 10px;
        font-size: 13px;
        font-family: inherit;
        font-weight: 700;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        text-decoration: none;
        display: block;
      }

      .btn-deposit {
        background: var(--pink-light);
        border: 1.5px solid var(--pink-border);
        color: var(--text-pink);
      }

      .btn-deposit:hover {
        background: var(--pink-border);
      }

      .btn-withdraw {
        background: var(--pink-light);
        border: 1.5px solid var(--pink-border);
        color: var(--text-pink);
      }

      .btn-withdraw:hover {
        background: var(--pink-border);
      }

      .btn-transfer {
        background: var(--pink);
        border: none;
        color: #fff;
      }

      .btn-transfer:hover {
        background: var(--pink-dark);
      }

      .btn-delete {
        background: #fff;
        border: 1.5px solid #ffc0c0;
        color: #c0392b;
      }

      .btn-delete:hover {
        background: #fff5f5;
      }

      /* 계좌 없을 때 */
      .account-empty {
        background: #fff;
        border-radius: 20px;
        border: 2px dashed var(--pink-border);
        padding: 3rem 2rem;
        text-align: center;
      }

      .account-empty-icon {
        font-size: 40px;
        margin-bottom: 1rem;
      }
      .account-empty-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 8px;
      }
      .account-empty-desc {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
      }

      /* 계좌 생성 모달 */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal {
        background: #fff;
        border-radius: 24px;
        padding: 2.5rem;
        width: 100%;
        max-width: 420px;
        margin: 1.5rem;
        animation: fadeUp 0.3s ease both;
      }

      .modal-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 0.5rem;
      }

      .modal-sub {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
      }

      .type-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      .type-item {
        border: 1.5px solid var(--pink-border);
        border-radius: 12px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }

      .type-item:hover {
        border-color: var(--pink);
        background: var(--pink-light);
      }
      .type-item.selected {
        border-color: var(--pink-dark);
        background: var(--pink-light);
      }

      .type-item-icon {
        font-size: 20px;
        margin-bottom: 6px;
      }
      .type-item-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--dark);
      }
      .type-item-desc {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .modal-btns {
        display: flex;
        gap: 10px;
      }

      .btn-modal-cancel {
        flex: 1;
        padding: 12px;
        font-size: 14px;
        font-family: inherit;
        border: 1.5px solid var(--pink-border);
        background: transparent;
        color: var(--text-muted);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-modal-cancel:hover {
        background: var(--pink-light);
      }

      .btn-modal-confirm {
        flex: 1;
        padding: 12px;
        font-size: 14px;
        font-family: inherit;
        font-weight: 700;
        background: var(--pink);
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-modal-confirm:hover {
        background: var(--pink-dark);
      }

      footer {
        padding: 1.5rem 3rem;
        text-align: center;
        border-top: 1px solid var(--pink-border);
        background: #fff;
      }

      footer p {
        font-size: 12px;
        color: var(--text-muted);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        nav {
          padding: 1rem 1.5rem;
        }
        .main {
          padding: 1.5rem 1rem;
        }
        .account-card-bottom {
          flex-wrap: wrap;
        }
        .btn-action {
          flex: 1 1 45%;
        }
        .type-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="../index.html" class="logo">JEONG <span>Bank</span></a>
      <div class="nav-right">
        <a href="dashboard.html" class="nav-back">← 대시보드</a>
      </div>
    </nav>

    <div class="main">
      <div class="page-header">
        <div class="page-title">🏦 계좌 관리</div>
        <button class="btn-create" onclick="openModal()">+ 계좌 생성</button>
      </div>

      <div class="account-list">
        <div class="account-card">
          <div class="account-card-top">
            <div class="account-info">
              <div class="account-type">입출금(보통)</div>
              <div class="account-number">JEONG-1778607374409-3586</div>
              <span class="account-status active">ACTIVE</span>
            </div>
            <div class="account-balance-wrap">
              <div class="account-balance-label">잔액</div>
              <div class="account-balance">₩ 2,000,010,000</div>
            </div>
          </div>
          <div class="account-card-bottom">
            <a href="deposit.html" class="btn-action btn-deposit">📥 입금</a>
            <a href="withdraw.html" class="btn-action btn-withdraw">📤 출금</a>
            <a href="transfer.html" class="btn-action btn-transfer">💸 이체</a>
            <button class="btn-action btn-delete" onclick="confirmDelete()">
              🗑 해지
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 계좌 생성 모달 -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-title">계좌 생성</div>
        <div class="modal-sub">개설할 계좌 종류를 선택하세요</div>

        <div class="type-grid">
          <div class="type-item" onclick="selectType(this, 1)">
            <div class="type-item-icon">💳</div>
            <div class="type-item-name">입출금(보통)</div>
            <div class="type-item-desc">자유롭게 입출금</div>
          </div>
          <div class="type-item" onclick="selectType(this, 2)">
            <div class="type-item-icon">📅</div>
            <div class="type-item-name">적금(정기)</div>
            <div class="type-item-desc">정해진 날짜에 저축</div>
          </div>
          <div class="type-item" onclick="selectType(this, 3)">
            <div class="type-item-icon">🗓</div>
            <div class="type-item-name">적금(자유)</div>
            <div class="type-item-desc">원하는 날짜에 저축</div>
          </div>
          <div class="type-item" onclick="selectType(this, 4)">
            <div class="type-item-icon">🏛</div>
            <div class="type-item-name">예금</div>
            <div class="type-item-desc">만기까지 이자 수령</div>
          </div>
          <div class="type-item" onclick="selectType(this, 5)">
            <div class="type-item-icon">🏠</div>
            <div class="type-item-name">주택청약</div>
            <div class="type-item-desc">청약 자격 획득</div>
          </div>
          <div class="type-item" onclick="selectType(this, 6)">
            <div class="type-item-icon">🅿️</div>
            <div class="type-item-name">파킹통장</div>
            <div class="type-item-desc">높은 이자 + 입출금</div>
          </div>
          <div
            class="type-item"
            onclick="selectType(this, 7)"
            style="grid-column: 1 / -1"
          >
            <div class="type-item-icon">📈</div>
            <div class="type-item-name">CMA</div>
            <div class="type-item-desc">매일 이자 + 자유 입출금</div>
          </div>
        </div>

        <div class="modal-btns">
          <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
          <button class="btn-modal-confirm" onclick="createAccount()">
            생성하기
          </button>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 JEONG Bank. 피싱 범죄 예방을 위한 스마트 뱅킹 시스템.</p>
    </footer>

    <script>
      let selectedTypeId = null;

      function openModal() {
        document.getElementById("modal").classList.add("show");
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("show");
        document
          .querySelectorAll(".type-item")
          .forEach((el) => el.classList.remove("selected"));
        selectedTypeId = null;
      }

      function selectType(el, id) {
        document
          .querySelectorAll(".type-item")
          .forEach((item) => item.classList.remove("selected"));
        el.classList.add("selected");
        selectedTypeId = id;
      }

      function createAccount() {
        if (!selectedTypeId) {
          alert("계좌 종류를 선택해주세요.");
          return;
        }
        alert(
          "계좌가 생성되었습니다!\n(실제 연동 시 서버로 요청이 전송됩니다)",
        );
        closeModal();
      }

      function confirmDelete() {
        if (
          confirm(
            "정말 이 계좌를 해지하시겠습니까?\n해지된 계좌는 복구되지 않습니다.",
          )
        ) {
          alert(
            "계좌가 해지되었습니다.\n(실제 연동 시 서버로 요청이 전송됩니다)",
          );
        }
      }

      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) closeModal();
      });
    </script>
  </body>
</html>
